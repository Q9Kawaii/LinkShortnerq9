<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickLink | Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-6 bg-gray-800 rounded-xl shadow-2xl">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">Link Shortener</h1>
        
        <div class="space-y-4">
            <input type="url" id="longUrl" placeholder="Paste long URL here..." 
                class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
            
            <button id="shortenBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">
                Shorten Link
            </button>

            <div id="resultArea" class="hidden mt-6 p-4 bg-gray-900 rounded border border-dashed border-gray-500">
                <p class="text-sm text-gray-400">Your short link:</p>
                <div class="flex items-center justify-between">
                    <span id="shortUrl" class="text-blue-300 font-mono break-all"></span>
                    <button onclick="copyLink()" class="ml-2 text-xs bg-gray-700 px-2 py-1 rounded">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Your actual config
    const firebaseConfig = {
        apiKey: "AIzaSyCYvvaSJHKqkOaSUr82zEC23KtQKESp1so",
        authDomain: "q9linkshortner.firebaseapp.com",
        projectId: "q9linkshortner",
        storageBucket: "q9linkshortner.firebasestorage.app",
        messagingSenderId: "437108585590",
        appId: "1:437108585590:web:fb73582828a0b42c385b57",
        measurementId: "G-GDZSCLW80E"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // REDIRECT LOGIC
    const pathId = window.location.hash.substring(1);
    if (pathId) {
        const docRef = doc(db, "links", pathId);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            window.location.href = docSnap.data().longUrl;
        }
    }

    // SHORTEN LOGIC
    document.getElementById('shortenBtn').onclick = async () => {
        const longUrl = document.getElementById('longUrl').value;
        if(!longUrl) return alert("Please enter a URL");

        // Generate a random 5-char ID
        const shortId = Math.random().toString(36).substring(2, 7);
        
        try {
            await setDoc(doc(db, "links", shortId), {
                longUrl: longUrl,
                createdAt: new Date()
            });

            const finalUrl = window.location.origin + window.location.pathname + "#" + shortId;
            document.getElementById('shortUrl').innerText = finalUrl;
            document.getElementById('resultArea').classList.remove('hidden');
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("Database Error! Make sure you enabled Firestore in Test Mode.");
        }
    };
</script>
</body>
</html>
