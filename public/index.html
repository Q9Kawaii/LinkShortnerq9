<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>QuickLink | Best Free Link Shortener & URL Maker</title>
    <meta name="description" content="Quickly create short links with our free link shortening tool. The easiest link short maker for social media and tracking.">
    <meta name="keywords" content="link shortener, link shortening tool, shorter link, link short maker, free url shortener">
    <meta name="author" content="Yash Dingar">

    <meta property="og:title" content="QuickLink | Free URL Shortener">
    <meta property="og:description" content="Truncate long URLs into snappy, shareable links in one click.">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <main class="w-full max-w-xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300 mb-2">
                QuickLink
            </h1>
            <p class="text-gray-400 text-sm md:text-base">The simplest Link Shortening Tool for creators.</p>
        </div>

        <section class="glass p-6 md:p-10 rounded-3xl shadow-2xl transition-all duration-500">
            <div class="space-y-6">
                <div>
                    <label for="longUrl" class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2 ml-1">Paste your long URL</label>
                    <input type="url" id="longUrl" placeholder="https://example.com/very-long-link..." 
                        class="w-full p-4 rounded-2xl bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-lg">
                </div>
                
                <button id="shortenBtn" 
                    class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 p-4 rounded-2xl font-bold text-lg shadow-lg transform active:scale-95 transition-all">
                    Shorten Link
                </button>

                <div id="resultArea" class="hidden animate-in fade-in zoom-in duration-300 mt-8 p-5 bg-black/40 rounded-2xl border border-blue-900/50">
                    <p class="text-xs font-semibold text-blue-400 uppercase tracking-widest mb-3 text-center">Ready to share!</p>
                    <div class="flex flex-col sm:flex-row items-center gap-3">
                        <span id="shortUrl" class="flex-1 text-blue-100 font-mono text-sm break-all bg-gray-800 p-3 rounded-xl border border-gray-700 text-center sm:text-left"></span>
                        <button id="copyBtn" onclick="copyLink()" class="w-full sm:w-auto bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl font-semibold text-sm transition">
                            Copy Link
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4 mt-10">
            <div class="p-4 rounded-2xl bg-gray-800/50 border border-gray-700/50">
                <h3 class="text-blue-400 font-bold text-sm">Fast Redirects</h3>
                <p class="text-gray-500 text-xs mt-1">Global edge delivery via Firebase.</p>
            </div>
            <div class="p-4 rounded-2xl bg-gray-800/50 border border-gray-700/50">
                <h3 class="text-blue-400 font-bold text-sm">No Expiry</h3>
                <p class="text-gray-500 text-xs mt-1">Your links live forever.</p>
            </div>
        </div>
    </main>

    <footer class="mt-12 text-gray-600 text-xs text-center">
        &copy; 2026 QuickLink | Built with JavaScript & Firebase
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYvvaSJHKqkOaSUr82zEC23KtQKESp1so",
            authDomain: "q9linkshortner.firebaseapp.com",
            projectId: "q9linkshortner",
            storageBucket: "q9linkshortner.firebasestorage.app",
            messagingSenderId: "437108585590",
            appId: "1:437108585590:web:fb73582828a0b42c385b57",
            measurementId: "G-GDZSCLW80E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // REDIRECT LOGIC
        const pathId = window.location.hash.substring(1);
        if (pathId) {
            const docRef = doc(db, "links", pathId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                window.location.href = docSnap.data().longUrl;
            }
        }

        // SHORTEN LOGIC
        document.getElementById('shortenBtn').onclick = async () => {
            let longUrl = document.getElementById('longUrl').value.trim();
            if(!longUrl) return alert("Enter a URL first!");
            
            // Add https if missing
            if (!/^https?:\/\//i.test(longUrl)) {
                longUrl = 'https://' + longUrl;
            }

            const shortId = Math.random().toString(36).substring(2, 7);
            
            try {
                await setDoc(doc(db, "links", shortId), {
                    longUrl: longUrl,
                    createdAt: new Date()
                });

                const finalUrl = window.location.origin + window.location.pathname + "#" + shortId;
                document.getElementById('shortUrl').innerText = finalUrl;
                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('shortenBtn').innerText = "Shortened!";
                setTimeout(() => { document.getElementById('shortenBtn').innerText = "Shorten Link"; }, 2000);
            } catch (e) {
                console.error(e);
                alert("Database Error! Check your Firestore rules.");
            }
        };

        // COPY FUNCTION
        window.copyLink = () => {
            const linkText = document.getElementById('shortUrl').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerText = "Copied!";
                copyBtn.classList.replace('bg-gray-700', 'bg-blue-600');
                setTimeout(() => {
                    copyBtn.innerText = "Copy Link";
                    copyBtn.classList.replace('bg-blue-600', 'bg-gray-700');
                }, 2000);
            });
        };
    </script>
</body>
</html>
